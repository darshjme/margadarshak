<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="800" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent_grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1f6feb;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#1f6feb;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#1f6feb;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="280" fill="url(#bg)"/>
  <!-- Subtle grid -->
  <g stroke="#21262d" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="56" x2="800" y2="56"/>
    <line x1="0" y1="112" x2="800" y2="112"/>
    <line x1="0" y1="168" x2="800" y2="168"/>
    <line x1="200" y1="0" x2="200" y2="280"/>
    <line x1="400" y1="0" x2="400" y2="280"/>
    <line x1="600" y1="0" x2="600" y2="280"/>
  </g>

  <!-- Accent glow bar -->
  <rect x="0" y="270" width="800" height="3" fill="url(#accent_grad)"/>
  <rect x="0" y="0" width="800" height="3" fill="url(#accent_grad)"/>

  <!-- Animation area (right side) -->
  
  <g>
    <circle cx="580" cy="140" r="18" fill="#1f6feb" fill-opacity="0.2" stroke="#1f6feb" stroke-width="1.5"/>
    <text x="580" y="145" fill="#1f6feb" font-size="9" text-anchor="middle" font-family="monospace">IN</text>
    <line x1="598" y1="130" x2="720" y2="80" stroke="#1f6feb" stroke-width="1.5" stroke-opacity="0.7"/>
    <line x1="598" y1="140" x2="720" y2="140" stroke="#1f6feb" stroke-width="1.5" stroke-opacity="0.7"/>
    <line x1="598" y1="150" x2="720" y2="200" stroke="#1f6feb" stroke-width="1.5" stroke-opacity="0.7"/>
    <circle cx="730" cy="80" r="14" fill="#1f6feb" fill-opacity="0.15" stroke="#1f6feb" stroke-width="1">
      <animate attributeName="fill-opacity" values="0.15;0.4;0.15" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="730" cy="140" r="14" fill="#1f6feb" fill-opacity="0.15" stroke="#1f6feb" stroke-width="1">
      <animate attributeName="fill-opacity" values="0.15;0.4;0.15" dur="2s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="730" cy="200" r="14" fill="#1f6feb" fill-opacity="0.15" stroke="#1f6feb" stroke-width="1">
      <animate attributeName="fill-opacity" values="0.15;0.4;0.15" dur="2s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Left: text content -->
  <!-- Package badge -->
  <rect x="40" y="38" width="110" height="22" rx="11" fill="#1f6feb" fill-opacity="0.12" stroke="#1f6feb" stroke-width="1" stroke-opacity="0.5"/>
  <text x="95" y="53" fill="#1f6feb" font-family="monospace" font-size="11" text-anchor="middle" font-weight="600">darshjme</text>

  <!-- Title -->
  <text x="40" y="110" fill="#f0f6fc" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="38" font-weight="700" letter-spacing="-1">agent-router</text>

  <!-- Tagline -->
  <text x="40" y="148" fill="#8b949e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15">Production request routing for multi-agent systems</text>

  <!-- Divider -->
  <line x1="40" y1="170" x2="460" y2="170" stroke="#1f6feb" stroke-width="0.5" stroke-opacity="0.4"/>

  <!-- Pills -->
  
    <rect x="94" y="220" width="136" height="26" rx="13" fill="#1f6feb" fill-opacity="0.15" stroke="#1f6feb" stroke-width="1"/>
    <text x="162" y="237" fill="#1f6feb" font-family="monospace" font-size="11" text-anchor="middle">Intent Routing</text>
    <rect x="242" y="220" width="160" height="26" rx="13" fill="#1f6feb" fill-opacity="0.15" stroke="#1f6feb" stroke-width="1"/>
    <text x="322" y="237" fill="#1f6feb" font-family="monospace" font-size="11" text-anchor="middle">Semantic Matching</text>
    <rect x="414" y="220" width="144" height="26" rx="13" fill="#1f6feb" fill-opacity="0.15" stroke="#1f6feb" stroke-width="1"/>
    <text x="486" y="237" fill="#1f6feb" font-family="monospace" font-size="11" text-anchor="middle">Fallback Chains</text>
    <rect x="570" y="220" width="136" height="26" rx="13" fill="#1f6feb" fill-opacity="0.15" stroke="#1f6feb" stroke-width="1"/>
    <text x="638" y="237" fill="#1f6feb" font-family="monospace" font-size="11" text-anchor="middle">Priority Rules</text>
</svg>